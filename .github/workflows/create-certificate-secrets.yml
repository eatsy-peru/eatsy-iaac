name: Create Certificate and Store as KeyVault Secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev, prd)'
        required: true
        type: choice
        options:
          - dev
          - prd
      secret_prefix:
        description: 'Prefix for secret names (e.g., "myapp-cert")'
        required: true
        type: string
      pem_blob_name:
        description: 'Blob name for .pem file in certs container (e.g., "myapp/cert.pem")'
        required: true
        type: string
      key_blob_name:
        description: 'Blob name for .key file in certs container (e.g., "myapp/key.key")'
        required: true
        type: string
      pfx_password:
        description: 'Password for PFX file (will be masked in logs)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  create-and-store-certificates:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: false

      - name: Store secrets in variables
        run: |
          echo "KEY_VAULT_NAME=${{ secrets.KEY_VAULT_NAME }}" >> $GITHUB_ENV
          echo "CERTS_STORAGE_ACCOUNT_NAME=${{ secrets.CERTS_STORAGE_ACCOUNT_NAME }}" >> $GITHUB_ENV

          if [ -z "${{ secrets.KEY_VAULT_NAME }}" ]; then
            echo "ERROR: KEY_VAULT_NAME secret not configured for ${{ github.event.inputs.environment }} environment"
            exit 1
          fi
          if [ -z "${{ secrets.CERTS_STORAGE_ACCOUNT_NAME }}" ]; then
            echo "ERROR: CERTS_STORAGE_ACCOUNT_NAME secret not configured for ${{ github.event.inputs.environment }} environment"
            exit 1
          fi

          echo "✓ Using Key Vault: ${{ secrets.KEY_VAULT_NAME }}"
          echo "✓ Using Storage Account: ${{ secrets.CERTS_STORAGE_ACCOUNT_NAME }}"

      - name: Download certificate files from blob storage
        run: |
          az storage blob download \
            --account-name "${CERTS_STORAGE_ACCOUNT_NAME}" \
            --container-name "certs" \
            --name "${{ github.event.inputs.pem_blob_name }}" \
            --file certificate.pem \
            --auth-mode login

          if [ ! -f "certificate.pem" ]; then
            echo "ERROR: Failed to download PEM file"
            exit 1
          fi
          echo "✓ Downloaded PEM file"

          az storage blob download \
            --account-name "${CERTS_STORAGE_ACCOUNT_NAME}" \
            --container-name "certs" \
            --name "${{ github.event.inputs.key_blob_name }}" \
            --file certificate.key \
            --auth-mode login

          if [ ! -f "certificate.key" ]; then
            echo "ERROR: Failed to download KEY file"
            exit 1
          fi
          echo "✓ Downloaded KEY file"

      - name: Create PFX from PEM and KEY
        run: |
          openssl pkcs12 \
            -export \
            -inkey certificate.key \
            -in certificate.pem \
            -out certificate.pfx \
            -password pass:"${{ github.event.inputs.pfx_password }}"

          if [ ! -f "certificate.pfx" ]; then
            echo "ERROR: Failed to create PFX file"
            exit 1
          fi
          echo "✓ PFX file created successfully"

      - name: Encode files to Base64
        run: |
          # Encode PEM to base64
          PEM_B64=$(cat certificate.pem | base64 -w0)
          echo "PEM_B64=${PEM_B64}" >> $GITHUB_ENV

          # Encode KEY to base64
          KEY_B64=$(cat certificate.key | base64 -w0)
          echo "KEY_B64=${KEY_B64}" >> $GITHUB_ENV

          # Encode PFX to base64
          PFX_B64=$(cat certificate.pfx | base64 -w0)
          echo "PFX_B64=${PFX_B64}" >> $GITHUB_ENV

          echo "✓ All files encoded to base64"

      - name: Create secrets in Key Vault
        run: |
          prefix="${{ github.event.inputs.secret_prefix }}"

          # Store PEM in base64
          az keyvault secret set \
            --vault-name "${KEY_VAULT_NAME}" \
            --name "${prefix}-b64-pem" \
            --value "${PEM_B64}" \
            --output none
          echo "✓ Stored ${prefix}-b64-pem"

          # Store KEY in base64
          az keyvault secret set \
            --vault-name "${KEY_VAULT_NAME}" \
            --name "${prefix}-b64-key" \
            --value "${KEY_B64}" \
            --output none
          echo "✓ Stored ${prefix}-b64-key"

          # Store PFX in base64
          az keyvault secret set \
            --vault-name "${KEY_VAULT_NAME}" \
            --name "${prefix}-b64-pfx" \
            --value "${PFX_B64}" \
            --output none
          echo "✓ Stored ${prefix}-b64-pfx"

          # Store password
          az keyvault secret set \
            --vault-name "${KEY_VAULT_NAME}" \
            --name "${prefix}-pfx-pass" \
            --value "${{ github.event.inputs.pfx_password }}" \
            --output none
          echo "✓ Stored ${prefix}-pfx-pass"

      - name: Cleanup sensitive files
        if: always()
        run: |
          rm -f certificate.pem certificate.key certificate.pfx
          # Clear environment variables containing sensitive data
          unset PEM_B64 KEY_B64 PFX_B64
          echo "✓ Cleanup completed"

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Certificate Secrets Successfully Created"
          echo ""
          echo "**Environment:** ${{ github.event.inputs.environment }}"
          echo "**Key Vault:** ${KEY_VAULT_NAME}"
          echo "**Secret Prefix:** ${{ github.event.inputs.secret_prefix }}"
          echo ""
          echo "**Secrets Created:**"
          echo "- \`${{ github.event.inputs.secret_prefix }}-b64-pem\`"
          echo "- \`${{ github.event.inputs.secret_prefix }}-b64-key\`"
          echo "- \`${{ github.event.inputs.secret_prefix }}-b64-pfx\`"
          echo "- \`${{ github.event.inputs.secret_prefix }}-pfx-pass\`"
